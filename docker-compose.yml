services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - invoice-maid-data:/app/backend/data

volumes:
  invoice-maid-data:
