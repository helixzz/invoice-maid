name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.1)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip rsync

      - name: Create release bundle
        run: |
          mkdir -p dist-release/invoice-maid
          rsync -a --exclude='.git' --exclude='backend/.venv' --exclude='backend/.coverage' --exclude='backend/.pytest_cache' --exclude='frontend/node_modules' --exclude='frontend/test-results' --exclude='frontend/playwright-report' --exclude='frontend/.playwright' --exclude='backend/data' --exclude='IDEA.md' ./ dist-release/invoice-maid/
          cd dist-release
          tar -czf invoice-maid-release.tar.gz invoice-maid
          zip -r invoice-maid-release.zip invoice-maid >/dev/null

      - name: Determine release tag
        id: meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.0.0-manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG#v}"
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist-release/invoice-maid-release.tar.gz
            dist-release/invoice-maid-release.zip
